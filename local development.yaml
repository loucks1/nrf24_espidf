esphome:
  name: development
  friendly_name: development

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"     # Reduces binary size
      sram1_as_iram: true              # Gives you +40KB usable RAM

# Enable logging
logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

ota:
  platform: esphome
  
spi:
  - id: nrf24_spi
    interface: spi2
    clk_pin: GPIO18
    mosi_pin: GPIO23
    miso_pin: GPIO19

# ====================== EXTERNAL COMPONENTS ======================
external_components:
  - source: 
      type: local
      path: components
    components: [ nrf24 ]

# ====================== nRF24 RADIO ======================
nrf24:
  id: my_nrf24
  spi_id: nrf24_spi
  cs_pin: GPIO21          # This is the CSN pin (handled by SPIDevice)
  ce_pin: GPIO22          # This is the CE pin (handled by SPIDevice)
  channel: 53
  rf_data_rate: "1MBPS"      # options: 250KBPS, 1MBPS, 2MBPS
  pa_level: "MAX"         # MIN, LOW, HIGH, MAX
  data_rate: 1MHz

button:
  - platform: restart
    name: "ESP Reboot"
    icon: mdi:power-cycle

# ====================== nRF24 RECEIVE MONITOR ======================
  - platform: template
    name: "Start Remote Search Mode"
    icon: mdi:magnify
    on_press:
      then:
        - lambda: |-
            auto& radio = id(my_nrf24);
            radio->stop_listening();

            radio->set_address_width(5);
            radio->open_reading_pipe(1, 0x5555555555LL);  // search pipe
            radio->set_auto_ack(false);  // Disable auto-ack for search mode
            radio->disable_crc();  // Disable CRC for search mode

            radio->start_listening();
            ESP_LOGI("nrf24", "=== ENTERED REMOTE SEARCH MODE ===");
            id(search_mode) = true;
        - script.execute: nrf24_receiver_script            

  - platform: template
    name: "Stop Listening"
    on_press:
      then:
        - script.stop: nrf24_receiver_script
        - lambda: |-
            id(my_nrf24).stop_listening();
            id(search_mode) = false;
            ESP_LOGI("nrf24", "Stopped listening");

script:
  - id: nrf24_receiver_script
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(search_mode);'
          then:
            - lambda: |-
                auto& radio = *id(my_nrf24); // Use the pointer correctly

                uint8_t pipe;
                // The ESPHome nrf24 component usually handles the 'available' 
                // check internally. We just need to grab the data if it's there.
                if (radio.available(&pipe)) {
                  ESP_LOGI("nrf24", "Data available, reading packet... %d", pipe);
                  uint8_t buffer[32];
                  radio.read(buffer, 32);

                  // Check for real data (not all 0x00 or 0xFF)
                  bool has_data = true;

                  if (has_data) {
                    char hex_str[97];
                    for (int i = 0; i < 32; i++) {
                      sprintf(&hex_str[i * 3], "%02X ", buffer[i]);
                    }
                    ESP_LOGI("nrf24", "RX Packet: %s", hex_str);
                  } else {
                    // If the buffer is full of zeros, we need to clear the log spam.
                    // Since we can't call write_register, the easiest way to reset 
                    // the internal FIFO state in this component is to toggle listening.
                    radio.stop_listening();
                    radio.start_listening();
                  }
                }
            - delay: 5ms  # Yield to system and control polling rate            
            - lambda: |-
                static uint32_t last_dump = 0;
                uint32_t now = millis();

                // Run if it's the first time (last_dump == 0) OR if 10 seconds have passed
                if (last_dump == 0 || now - last_dump >= 100000) {
                  id(my_nrf24).dump_config();
                  last_dump = now;
                }
# Global variable to track search mode
globals:
  - id: search_mode
    type: bool
    restore_value: false
    initial_value: 'false'   