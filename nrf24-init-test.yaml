esphome:
  name: nrf24-init-test
  friendly_name: NRF24 Init Test

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"     # Reduces binary size
      sram1_as_iram: true              # Gives you +40KB usable RAM

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

logger:
  level: DEBUG
  baud_rate: 115200

output:
  - platform: gpio
    pin: GPIO22
    id: nrf24_ce_pin

# ====================== SPI BUS ======================
spi:
  - id: nrf24_spi
    interface: any
    clk_pin: GPIO18
    mosi_pin: GPIO23
    miso_pin: GPIO19
    # Optional: lower speed for stability during testing
    # frequency: 1MHz

# ====================== nRF24L01 via SPI Device ======================
spi_device:
  - id: nrf24_spidev
    spi_id: nrf24_spi
    cs_pin: GPIO21
    # Most nRF24 work well at 1-10MHz. Start low for testing.
    #frequency: 2MHz
    spi_mode: 0
    data_rate: 1MHz   # legacy alias, keep for compatibility

# ====================== GLOBAL FOR STATUS ======================
globals:
  - id: nrf24_initialized
    type: bool
    initial_value: 'false'

# ====================== INITIALIZATION ======================
button:
  - platform: template
    name: "Initialize nRF24L01"
    id: init_nrf24
    icon: mdi:chip
    on_press:
      then:
        - lambda: |-
            auto& spidev = id(nrf24_spidev);
            auto ce = id(nrf24_ce_pin);

            ce->turn_off(); // Ensure CE is low during init

            // Helper to write a register (Command 0x20 | reg)
            auto write_reg = [&](uint8_t reg, uint8_t value) {
              spidev->enable();
              spidev->write_byte(0x20 | reg);
              spidev->write_byte(value);
              spidev->disable();
            };

            // Helper to read a register (Command 0x00 | reg)
            auto read_reg = [&](uint8_t reg) -> uint8_t {
              spidev->enable();
              spidev->write_byte(0x00 | reg);
              uint8_t val = spidev->read_byte(); // This performs the transfer
              spidev->disable();
              return val;
            };

            // Helper to send a single command (like FLUSH)
            auto send_cmd = [&](uint8_t cmd) {
              spidev->enable();
              spidev->write_byte(cmd);
              spidev->disable();
            };

            ESP_LOGI("nrf24", "=== Starting nRF24L01 Initialization ===");

            // Power down first
            write_reg(0x00, 0x00); 
            delay(500);
            yield();

            // Flush FIFOs
            send_cmd(0xE1); // FLUSH_TX
            send_cmd(0xE2); // FLUSH_RX

            // Basic register setup
            write_reg(0x01, 0x01); // EN_AA
            write_reg(0x02, 0x01); // EN_RXADDR
            write_reg(0x03, 0x03); // SETUP_AW
            write_reg(0x04, 0x00); // SETUP_RETR
            write_reg(0x05, 53);   // RF_CH
            write_reg(0x06, 0x07); // RF_SETUP
            write_reg(0x1C, 0x00); // DYNPD
            write_reg(0x1D, 0x00); // FEATURE

            // Power up + CRC + PTX mode
            write_reg(0x00, 0x0E); 
            delay(500);
            yield();

            // Read back CONFIG to verify
            uint8_t config = read_reg(0x00);
            ESP_LOGI("nrf24", "Read CONFIG register = 0x%02X (expected 0x0E)", config);

            if (config == 0x0E) {
              id(nrf24_initialized) = true;
              ESP_LOGI("nrf24", "✅ nRF24L01 initialized SUCCESSFULLY!");
            } else {
              ESP_LOGE("nrf24", "❌ nRF24L01 initialization FAILED!");
            }